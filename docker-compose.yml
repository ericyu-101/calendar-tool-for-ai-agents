version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: calendar_mcp_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calendar_mcp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    container_name: calendar_mcp_server
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/calendar_mcp
      NODE_ENV: production
    depends_on:
      - db
    stdin_open: true
    tty: true

volumes:
  pgdata:

