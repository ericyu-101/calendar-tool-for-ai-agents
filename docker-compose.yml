version: "2.4"
services:
  db:
    image: postgres:16-alpine
    container_name: calendar_mcp_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: calendar_mcp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 20

  service:
    build: .
    container_name: calendar_mcp_server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/calendar_mcp
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  pgdata:
